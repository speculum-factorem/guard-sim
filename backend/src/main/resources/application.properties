spring.application.name=guardsim-backend
server.port=8080

spring.datasource.url=jdbc:h2:mem:guardsim;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

# Все сценарии доступны независимо от роли (временно; для продакшена выставить false)
guardsim.scenarios.unlock-all=true
