spring.application.name=guardsim-backend
server.port=8080

# Файловый H2 в ./data (создаётся при первом запуске). Для продакшена обычно PostgreSQL.
spring.datasource.url=jdbc:h2:file:./data/guardsim;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

# JWT (HS256), минимум 32 байта UTF-8. В продакшене задайте GUARDSIM_JWT_SECRET в окружении.
guardsim.jwt.secret=${GUARDSIM_JWT_SECRET:guardsim-dev-jwt-secret-change-in-production-32b!}
guardsim.jwt.expiration-ms=604800000
