spring.application.name=guardsim-backend
server.port=8080

# PostgreSQL. В Docker задаётся через SPRING_DATASOURCE_* (см. docker-compose).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/guardsim}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:guardsim}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:guardsim}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT (HS256), минимум 32 байта UTF-8. В продакшене задайте GUARDSIM_JWT_SECRET в окружении.
guardsim.jwt.secret=${GUARDSIM_JWT_SECRET:guardsim-dev-jwt-secret-change-in-production-32b!}
guardsim.jwt.expiration-ms=604800000
