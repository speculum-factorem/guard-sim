# GuardSim: nginx (статика + прокси /api) + Spring Boot + H2 в volume.
# 1) cp .env.example .env  и задайте GUARDSIM_JWT_SECRET (длинная случайная строка, не короче 32 байт в UTF-8).
# 2) docker compose up --build
# 3) Откройте http://localhost
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      GUARDSIM_JWT_SECRET: ${GUARDSIM_JWT_SECRET:?Set GUARDSIM_JWT_SECRET in .env (see .env.example)}
      SPRING_DATASOURCE_URL: jdbc:h2:file:/app/data/guardsim;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    volumes:
      - guardsim-data:/app/data
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -H \"X-GuardSim-Player: 00000000-0000-0000-0000-000000000099\" -H \"X-GuardSim-Demo: 1\" http://127.0.0.1:8080/api/scenarios > /dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  guardsim-data:
