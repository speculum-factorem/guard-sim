# GuardSim: nginx (статика + прокси /api) + Spring Boot + PostgreSQL.
# 1) cp .env.example .env — задайте GUARDSIM_JWT_SECRET и POSTGRES_PASSWORD.
# 2) docker compose up --build
# 3) http://localhost:8080 (порт GUARDSIM_WEB_PORT, см. .env.example)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guardsim
      POSTGRES_USER: guardsim
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env (see .env.example)}
    volumes:
      - guardsim-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardsim -d guardsim"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      GUARDSIM_JWT_SECRET: ${GUARDSIM_JWT_SECRET:?Set GUARDSIM_JWT_SECRET in .env (see .env.example)}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/guardsim
      SPRING_DATASOURCE_USERNAME: guardsim
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf -H \"X-GuardSim-Player: 00000000-0000-0000-0000-000000000099\" -H \"X-GuardSim-Demo: 1\" http://127.0.0.1:8080/api/scenarios > /dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${GUARDSIM_WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  guardsim-pgdata:
